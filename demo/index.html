<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starling Components Demo</title>
    <script>
      (function () {
        var v = 1;
        var d = {
          dark: false,
          accent: '#6366f1',
          bg: '#ffffff',
          panel: '#ffffff',
          surface: '#f4f4f5',
          border: '#e4e4e7',
          fg: '#09090b',
          muted: '#71717a',
          radius: '12px',
          font: 'sans',
          headerFont: 'sans',
          shadow: 'md',
          btnShadow: 'md',
        };
        var hasPersisted = false;
        try {
          var s = localStorage.getItem('cdx_theme');
          if (s) {
            var p = JSON.parse(s);
            if (p.version === v && p.mode && p.light && p.dark) {
              Object.assign(d, p.light);
              if (p.mode === 'dark') {
                d.bg = toDark(d.bg);
                d.panel = toDark(d.panel);
                d.surface = toDark(d.surface);
                d.border = toDark(d.border);
                d.fg = toDark(d.fg);
                d.muted = toDark(d.muted);
                Object.assign(d, p.dark);
              }
              d.dark = p.mode === 'dark';
              hasPersisted = true;
            }
          }
        } catch (e) {}
        if (!hasPersisted) d.dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var fonts = {
          sans: '"Inter", system-ui, sans-serif',
          mono: '"JetBrains Mono", ui-monospace, monospace',
          serif: '"Playfair Display", Georgia, serif',
          display: '"Archivo Black", Impact, sans-serif',
          system: 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
          modern: '"Space Grotesk", sans-serif',
          reading: '"Lexend", sans-serif',
          geometric: '"Outfit", sans-serif',
          condensed: '"Bebas Neue", sans-serif',
          'soft-serif': '"Fraunces", serif',
          oxanium: '"Oxanium", sans-serif',
        };
        var shadows = {
          none: 'none',
          sm: '0 1px 2px 0 rgb(0 0 0 / 0.05)',
          md: '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)',
          lg: '0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1)',
          xl: '0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1)',
          '2xl': '0 25px 50px -12px rgb(0 0 0 / 0.25)',
          neo: '2px 2px 0px 0px var(--stroke)',
          flat: '4px 4px 0px 0px var(--stroke)',
          hard: '6px 6px 0px 0px var(--fg-main)',
        };
        var r = document.documentElement;
        r.classList.toggle('dark', d.dark);
        r.style.colorScheme = d.dark ? 'dark' : 'light';
        r.style.setProperty('--primary-color', d.accent);
        r.style.setProperty('--bg-main', d.bg);
        r.style.setProperty('--bg-panel', d.panel);
        r.style.setProperty('--bg-surface', d.surface);
        r.style.setProperty('--border-main', d.border);
        r.style.setProperty('--stroke', d.border);
        r.style.setProperty('--fg-main', d.fg);
        r.style.setProperty('--text-muted', d.muted);
        r.style.setProperty('--sidebar', d.surface);
        r.style.setProperty('--sidebar-fg', d.fg);
        r.style.setProperty('--sidebar-primary', d.fg);
        r.style.setProperty('--sidebar-primary-fg', d.bg);
        r.style.setProperty('--sidebar-accent', d.border);
        r.style.setProperty('--sidebar-accent-fg', d.fg);
        r.style.setProperty('--sidebar-border', d.border);
        r.style.setProperty('--sidebar-ring', d.accent);
        var rv = d.radius,
          fv = fonts[d.font] || fonts.sans,
          hfv = fonts[d.headerFont] || fonts.sans,
          sv = shadows[d.shadow] || 'none',
          bsv = shadows[d.btnShadow] || 'none';
        ['--radius-card', '--radius-btn', '--radius-input', '--radius-badge'].forEach(function (k) {
          r.style.setProperty(k, rv);
        });
        r.style.setProperty('--display-main', hfv);
        r.style.setProperty('--sans-main', fv);
        r.style.setProperty('--shadow-main', sv);
        r.style.setProperty('--shadow-btn', bsv);
        function toDark(h) {
          var r = 255 - Number.parseInt(h.slice(1, 3), 16);
          var g = 255 - Number.parseInt(h.slice(3, 5), 16);
          var b = 255 - Number.parseInt(h.slice(5, 7), 16);
          return (
            '#' +
            ('00' + r.toString(16)).slice(-2) +
            ('00' + g.toString(16)).slice(-2) +
            ('00' + b.toString(16)).slice(-2)
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
